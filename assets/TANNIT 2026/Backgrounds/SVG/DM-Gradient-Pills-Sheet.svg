<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <!-- Gradient System row -->
    <linearGradient id="gs1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FD4"/>
      <stop offset="100%" stop-color="#CC3FCC"/>
    </linearGradient>
    <linearGradient id="gs2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC3FCC"/>
      <stop offset="100%" stop-color="#50D4CC"/>
    </linearGradient>
    <linearGradient id="gs3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#90BEED"/>
      <stop offset="100%" stop-color="#3DCEC8"/>
    </linearGradient>
    <linearGradient id="gs4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A148A"/>
      <stop offset="100%" stop-color="#9438C8"/>
    </linearGradient>
    <linearGradient id="gs5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#28A8B0"/>
      <stop offset="100%" stop-color="#080820"/>
    </linearGradient>

    <!-- Pill shapes row -->
    <linearGradient id="ps1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8030D8"/>
      <stop offset="100%" stop-color="#CC3FCC"/>
    </linearGradient>
    <linearGradient id="ps2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D060E0"/>
      <stop offset="100%" stop-color="#50D4CC"/>
    </linearGradient>
    <linearGradient id="ps3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5830C0"/>
      <stop offset="100%" stop-color="#38C8C4"/>
    </linearGradient>
    <linearGradient id="ps4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38C8C4"/>
      <stop offset="100%" stop-color="#28A0A8"/>
    </linearGradient>
    <linearGradient id="ps5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E1070"/>
      <stop offset="100%" stop-color="#0A0820"/>
    </linearGradient>
    <linearGradient id="ps6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CC3FCC"/>
      <stop offset="100%" stop-color="#6028B8"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="880" height="420" fill="#ffffff"/>

  <!-- ── GRADIENT SYSTEM ── -->
  <text x="20" y="28" font-size="16" font-weight="700" fill="#1a1218">Gradient System</text>

  <!-- 5 gradient pills -->
  <rect x="20"  y="44" width="148" height="46" rx="23" fill="url(#gs1)"/>
  <rect x="184" y="44" width="130" height="46" rx="23" fill="url(#gs2)"/>
  <rect x="330" y="44" width="130" height="46" rx="23" fill="url(#gs3)"/>
  <rect x="476" y="44" width="162" height="46" rx="23" fill="url(#gs4)"/>
  <rect x="654" y="44" width="206" height="46" rx="23" fill="url(#gs5)"/>

  <!-- Caption -->
  <text x="20" y="112" font-size="9.5" fill="#9a8aa5">Gradient angle always 135°. Max 3 colour stops. Never apply gradients to body text or small labels.</text>

  <!-- ── PILL SHAPE LIBRARY ── -->
  <text x="20" y="150" font-size="16" font-weight="700" fill="#1a1218">Pill Shape Library</text>

  <text x="20" y="172" font-size="9.5" fill="#1a1218">The pill (capsule) is the signature shape of the Digital Marketing sub-brand. Use as background accents, image masks</text>
  <text x="20" y="187" font-size="9.5" fill="#1a1218">and </text>
  <text x="41" y="187" font-size="9.5" fill="#6B22C0">CTA</text>
  <text x="63" y="187" font-size="9.5" fill="#1a1218"> button shapes.</text>

  <!-- Pill 1: wide horizontal -->
  <rect x="20"  y="208" width="155" height="66"  rx="33" fill="url(#ps1)"/>

  <!-- Pill 2: tall medium -->
  <rect x="198" y="196" width="70"  height="118" rx="35" fill="url(#ps2)"/>

  <!-- Pill 3: tall narrow -->
  <rect x="286" y="184" width="56"  height="140" rx="28" fill="url(#ps3)"/>

  <!-- Pill 4: square-ish -->
  <rect x="362" y="208" width="82"  height="92"  rx="41" fill="url(#ps4)"/>

  <!-- Pill 5: wide flat dark -->
  <rect x="464" y="228" width="148" height="56"  rx="28" fill="url(#ps5)"/>

  <!-- Pill 6: small squarish -->
  <rect x="632" y="200" width="76"  height="100" rx="38" fill="url(#ps6)"/>

  <!-- Gradient bar at bottom -->
  <rect x="0" y="412" width="880" height="8" rx="0">
    <animate attributeName="opacity" values="1" dur="0s" fill="freeze"/>
  </rect>
  <rect x="0" y="412" width="880" height="8" fill="url(#gs2)"/>
</svg>
