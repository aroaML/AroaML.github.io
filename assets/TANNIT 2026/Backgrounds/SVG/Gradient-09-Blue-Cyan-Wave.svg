<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <!-- Deep blue base -->
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0500CC"/>
      <stop offset="100%" stop-color="#0800A0"/>
    </linearGradient>
    <!-- Cyan sweep from right -->
    <radialGradient id="cyan" cx="85%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#00E5FF" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#00AADD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0500CC" stop-opacity="0"/>
    </radialGradient>
    <!-- Purple wave top-left -->
    <radialGradient id="purple" cx="20%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#6600CC" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#4400AA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0500CC" stop-opacity="0"/>
    </radialGradient>
    <!-- Dark vignette bottom -->
    <linearGradient id="vignette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="60%"  stop-color="#0500CC" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020060" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Bright cyan edge highlight -->
    <linearGradient id="edge" x1="100%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#00FFFF" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#00CCFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0500CC" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1000" fill="url(#base)"/>
  <rect width="1000" height="1000" fill="url(#purple)"/>
  <rect width="1000" height="1000" fill="url(#cyan)"/>
  <rect width="1000" height="1000" fill="url(#edge)"/>
  <rect width="1000" height="1000" fill="url(#vignette)"/>
</svg>
