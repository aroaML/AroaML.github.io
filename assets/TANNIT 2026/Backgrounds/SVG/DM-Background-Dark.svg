<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100A1A"/>
      <stop offset="55%" stop-color="#1E0A40"/>
      <stop offset="100%" stop-color="#0A1E30"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B22C0"/>
      <stop offset="100%" stop-color="#C040C8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C040C8"/>
      <stop offset="100%" stop-color="#00C4BE"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B22C0"/>
      <stop offset="100%" stop-color="#00C4BE"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A1080"/>
      <stop offset="50%" stop-color="#6B22C0"/>
      <stop offset="100%" stop-color="#C040C8"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C4BE"/>
      <stop offset="100%" stop-color="#100A1A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Pill shapes - background layer (low opacity) -->
  <rect x="820" y="-80" width="180" height="420" rx="90" fill="url(#g1)" opacity="0.18" transform="rotate(15 910 120)"/>
  <rect x="980" y="300" width="120" height="300" rx="60" fill="url(#g2)" opacity="0.14" transform="rotate(-10 1040 450)"/>
  <rect x="-60" y="500" width="200" height="100" rx="50" fill="url(#g3)" opacity="0.16" transform="rotate(20 40 550)"/>

  <!-- Pill shapes - foreground layer -->
  <rect x="880" y="80" width="90" height="220" rx="45" fill="url(#g1)" opacity="0.55"/>
  <rect x="1000" y="200" width="70" height="180" rx="35" fill="url(#g2)" opacity="0.5"/>
  <rect x="60" y="560" width="260" height="80" rx="40" fill="url(#g3)" opacity="0.45"/>
  <rect x="920" y="580" width="55" height="140" rx="27" fill="url(#g4)" opacity="0.6"/>
  <rect x="30" y="80" width="75" height="190" rx="37" fill="url(#g5)" opacity="0.4"/>
  <rect x="130" y="30" width="200" height="65" rx="32" fill="url(#g1)" opacity="0.35"/>
</svg>
