<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <!-- Violet light → Warm white -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4A8E8"/>
      <stop offset="100%" stop-color="#F8F0E3"/>
    </linearGradient>
    <!-- Teal → Warm white -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6AA8A4"/>
      <stop offset="100%" stop-color="#F8F0E3"/>
    </linearGradient>
    <!-- Dark purple → Medium purple -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A3260"/>
      <stop offset="100%" stop-color="#8A6E9A"/>
    </linearGradient>
  </defs>

  <rect width="800" height="260" fill="none"/>

  <!-- Pill 1: Violet light → Warm -->
  <rect x="0" y="0"   width="800" height="72" rx="36" fill="url(#g1)"/>
  <!-- Pill 2: Teal → Warm -->
  <rect x="0" y="94"  width="800" height="72" rx="36" fill="url(#g2)"/>
  <!-- Pill 3: Dark purple → Medium purple -->
  <rect x="0" y="188" width="800" height="72" rx="36" fill="url(#g3)"/>
</svg>
