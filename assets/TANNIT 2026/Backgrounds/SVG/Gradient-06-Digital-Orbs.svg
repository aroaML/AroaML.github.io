<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <!-- Background base -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0e0620"/>
      <stop offset="100%" stop-color="#080820"/>
    </linearGradient>

    <!-- Teal orb - left -->
    <radialGradient id="orb-teal" cx="30%" cy="45%" r="45%" fx="30%" fy="45%">
      <stop offset="0%"   stop-color="#50D4CC" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#28A8B0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#080820" stop-opacity="0"/>
    </radialGradient>

    <!-- Violet orb - right -->
    <radialGradient id="orb-violet" cx="72%" cy="55%" r="50%" fx="72%" fy="55%">
      <stop offset="0%"   stop-color="#CC3FCC" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#7B2FD4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#080820" stop-opacity="0"/>
    </radialGradient>

    <!-- Small accent orb - top right -->
    <radialGradient id="orb-accent" cx="78%" cy="18%" r="28%" fx="78%" fy="18%">
      <stop offset="0%"   stop-color="#7B2FD4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#080820" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1000" height="1000" fill="url(#bg)"/>

  <!-- Orbs layered -->
  <rect width="1000" height="1000" fill="url(#orb-teal)"/>
  <rect width="1000" height="1000" fill="url(#orb-violet)"/>
  <rect width="1000" height="1000" fill="url(#orb-accent)"/>
</svg>
