<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aroa Martín — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red-bg:   #9E3B2E;
      --red-nav:  #9E2210;
      --white:    #FFFFFF;
      --gray:     #5A5550;
      --gray-lt:  #9B9590;
      --line:     #D4CFC8;
      --card-w:   540px;
      --card-h:   340px;
    }

    html, body { height: 100%; font-family: 'Jost', sans-serif; }

    /* ── PÁGINA ── */
    .contact-page {
      min-height: 100vh;
      background: var(--red-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 100px;;
    }

    /* ── NAV SUPERIOR ── */
    .nav-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      background: transparent;
    }

    .nav-top .side-left,
    .nav-top .side-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-top .line-center {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.2);
    }

    .nav-num {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 9px;
      color: rgba(255,255,255,0.45);
    }

    .nav-link {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      transition: color 0.25s, letter-spacing 0.3s;
    }

    .nav-link:hover { color: var(--white); letter-spacing: 0.28em; }
    .nav-link.active { color: var(--white); }

    /* ── NAV INFERIOR ── */
    .nav-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      background: transparent;
    }

    .nav-bottom .side-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-bottom .line-center {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.2);
    }

    /* ══════════════════════════════════════════
       ESCENA 3D
    ══════════════════════════════════════════ */
    .scene {
      width: var(--card-w);
      height: var(--card-h);
      perspective: 1400px;
      cursor: pointer;
      position: relative;
    }

    /* ── TARJETA ── */
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
      -webkit-transition: -webkit-transform 0.9s cubic-bezier(0.77, 0, 0.18, 1);
      transition: transform 0.9s cubic-bezier(0.77, 0, 0.18, 1);
      transform-origin: center center;
      will-change: transform;
    }

    .card.flipped {
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
    }

    /* ── CARAS ── */
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 2px;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      /* overflow: hidden eliminado — causa bug de desaparición en iOS Safari */
      background: var(--white);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.12),
        0 8px 32px rgba(0,0,0,0.16);
    }

    .card-back {
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
    }

    /* ══════════════════════════════════════════
       ANIMACIÓN DE ESQUINA REALISTA
       La tarjeta se inclina como si la
       levantaras por la esquina inferior derecha
    ══════════════════════════════════════════ */
    .scene:hover .card:not(.flipped) {
      -webkit-transform:
        rotateX(3deg)
        rotateY(-4deg)
        translateY(-6px);
      transform:
        rotateX(3deg)
        rotateY(-4deg)
        translateY(-6px);
      box-shadow:
        -8px 16px 48px rgba(0,0,0,0.28),
        -2px 4px 12px rgba(0,0,0,0.14);
      transition:
        transform 0.5s cubic-bezier(0.34, 1.3, 0.64, 1),
        box-shadow 0.5s ease;
    }

    /* Gradiente de sombra en esquina inferior derecha */
    .card-face::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 80px;
      height: 80px;
      background: radial-gradient(
        ellipse at bottom right,
        rgba(0,0,0,0.08) 0%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .scene:hover .card-face::after { opacity: 1; }

    /* Texto "flip" en esquina */
    .corner-icon {
      position: absolute;
      bottom: 12px;
      right: 14px;
      z-index: 20;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--line);
      font-family: 'Jost', sans-serif;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }

    .scene:hover .corner-icon {
      opacity: 1;
      transform: translateY(0);
    }

    /* ══════════════════════════════════════════
       CARA FRONTAL
    ══════════════════════════════════════════ */
    .front-body {
      display: flex;
      height: 100%;
      align-items: flex-end;
    }

    .front-left {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 0 28px 28px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    /* ── CAMBIA AQUÍ TUS DATOS DE CONTACTO ── */
    .contact-link {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: var(--gray);
      text-decoration: none;
      letter-spacing: 0.06em;
      display: block;
      transition: color 0.2s ease;
    }

    .contact-link:hover { color: var(--red-nav); }

    .front-illustration {
      flex: 1;
      height: 100%;
      overflow: hidden;
    }

    .front-illustration img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 10px;
      display: block;
    }

    /* ══════════════════════════════════════════
       CARA TRASERA
    ══════════════════════════════════════════ */
    .back-body {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    /* ── CAMBIA AQUÍ EL TEXTO DE LA CARA TRASERA ── */
    .back-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      color: var(--gray);
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 580px) {
      :root {
        --card-w: 88vw;
        --card-h: 240px;
      }

      .front-left { padding: 0 0 20px 20px; }
    }
  </style>
</head>
<body>

  <!-- NAV SUPERIOR -->
  <nav class="nav-top">
    <div class="side-left">
      <span class="nav-num">(1)</span>
      <a href="index.html" class="nav-link">Who is she?</a>
    </div>
    <div class="line-center"></div>
    <div class="side-right">
      <a href="index.html#work" class="nav-link">What she do?</a>
      <span class="nav-num">(2)</span>
    </div>
  </nav>

  <!-- PÁGINA -->
  <main class="contact-page">
    <div class="scene" id="scene">
      <div class="card" id="card">

        <!-- CARA FRONTAL -->
        <div class="card-face card-front">
          <div class="front-body">

            <!-- ── ENLACES — cambia href por los tuyos ── -->
            <div class="front-left">
              <a class="contact-link"
                 href="https://www.linkedin.com/in/tu-perfil"
                 target="_blank"
                 rel="noopener noreferrer">
                linkedin
              </a>
              <a class="contact-link"
                 href="mailto:aroamtnlpz@gmail.com">
                aroamtnlpz@gmail.com
              </a>
            </div>

            <!-- ── IMAGEN — el archivo tiene que estar
                 en la misma carpeta que contact.html ── -->
            <div class="front-illustration">
              <img src="assets/ui/Contactofondo.png" alt="Ilustración pájaro en rama">
            </div>

          </div>

          <div class="corner-icon">flip</div>
        </div>

        <!-- CARA TRASERA -->
        <div class="card-face card-back">
          <div class="back-body">
            <p class="back-text">Gracias.</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- NAV INFERIOR -->
  <nav class="nav-bottom">
    <div class="side-left">
      <span class="nav-num">(3)</span>
      <a href="#" class="nav-link active">Contact</a>
    </div>
    <div class="line-center"></div>
  </nav>

  <script>
    const scene = document.getElementById('scene');
    const card  = document.getElementById('card');

    // Clic en cualquier parte de la tarjeta → voltea
    scene.addEventListener('click', () => {
      card.classList.toggle('flipped');
    });
  </script>

</body>
</html>
