<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aroa Martín — Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream : #F4F0EB;
      --black : #0E0D0B;
      --gray  : #5A5550;
      --line  : #D4CFC8;
      --red   : #9E2210;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--cream);
      font-family: 'Jost', sans-serif;
    }

    /* ── NAV TOP ───────────────────────────────────────── */
    .nav-top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--cream); height: 48px;
      display: flex; align-items: center; padding: 0 32px;
    }
    .nav-top .side-left,
    .nav-top .side-right {
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }

    /* ── NAV BOTTOM ────────────────────────────────────── */
    .nav-bottom {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--cream); height: 48px;
      display: flex; align-items: center; padding: 0 32px;
    }
    .nav-bottom .side-left {
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }

    /* shared nav elements */
    .line-center { flex: 1; height: 1px; background: var(--black); }

    .nav-num {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 9px;
      color: var(--red); line-height: 1;
    }
    .nav-link {
      font-size: 9px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--black); text-decoration: none;
      transition: color 0.25s, letter-spacing 0.3s;
    }
    .nav-link:hover { color: var(--red); letter-spacing: 0.28em; }

    /* ── SCENE ─────────────────────────────────────────── */
    .scene {
      position: fixed;
      top: 48px; bottom: 48px; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    /* ── FIGURE ────────────────────────────────────────── */
    #figure-img {
      display: block;
      height: clamp(260px, 52vh, 500px);

      width: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── LABEL ─────────────────────────────────────────── */
    #cable-label {
      position: fixed;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(18px, 1.8vw, 28px);
      color: var(--black);
      letter-spacing: 0.01em;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      /* top / left set by JS */
    }

    /* ── CABLE SVG ─────────────────────────────────────── */
    #cable-svg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    #cable-path {
      fill: none;
      stroke: #0E0D0B;
      stroke-width: 1.2px;
      stroke-linecap: round;
    }

    /* ── MOBILE ────────────────────────────────────────── */
    @media (max-width: 640px) {
      .nav-top, .nav-bottom { padding: 0 20px; }
      #figure-img { height: clamp(200px, 44vh, 340px); }
      #cable-label { font-size: 14px; }
    }
  </style>
</head>
<body>

  <!-- NAV TOP -->
  <nav class="nav-top">
    <div class="side-left">
      <span class="nav-num">(1)</span>
      <a href="index.html" class="nav-link">Who is she?</a>
    </div>
    <div class="line-center"></div>
    <div class="side-right">
      <a href="index.html#work" class="nav-link">What she do?</a>
      <span class="nav-num">(2)</span>
    </div>
  </nav>

  <!-- SCENE -->
  <main class="scene">
    <img src="assets/images/ui/Underconstruction.png" id="figure-img" alt="" draggable="false">
  </main>

  <!-- LABEL (positioned by JS) -->
  <span id="cable-label">Under construction</span>

  <!-- CABLE (drawn by JS) -->
  <svg id="cable-svg" aria-hidden="true">
    <path id="cable-path" d=""/>
  </svg>

  <!-- NAV BOTTOM -->
  <nav class="nav-bottom">
    <div class="side-left">
      <span class="nav-num">(3)</span>
      <a href="contact.html" class="nav-link">Contact</a>
    </div>
    <div class="line-center"></div>
  </nav>

  <script>
    'use strict';

    /* ──────────────────────────────────────────────────────
       CONFIG
    ────────────────────────────────────────────────────── */
    const N_INNER    = 12;   // interior control points (endpoints are extra)
    const SPRING_K   = 0.07; // spring stiffness  (higher → snappier)
    const DAMPING    = 0.72; // velocity damping   (lower  → more bounce)
    const MAX_LIFT   = 54;   // px cable rises at cursor hot-spot
    const RADIUS     = 140;  // px radius of cursor influence
    const SAG        = 9;    // px natural sag at cable midpoint (catenary feel)

    // Where the cable exits the figure, as fraction of rendered image size
    const FOOT_X = 0.52;     // 0 = left edge of image, 1 = right edge
    const FOOT_Y = 0.80;     // 0 = top  edge of image, 1 = bottom edge

    /* ──────────────────────────────────────────────────────
       STATE
    ────────────────────────────────────────────────────── */
    let pts = [];    // array of { x, restY, y, vy }
    let mX  = -9999, mY = -9999;   // cursor in viewport px

    /* ──────────────────────────────────────────────────────
       DOM
    ────────────────────────────────────────────────────── */
    const figEl   = document.getElementById('figure-img');
    const pathEl  = document.getElementById('cable-path');
    const labelEl = document.getElementById('cable-label');

    /* ──────────────────────────────────────────────────────
       INIT  –  compute cable geometry from rendered image
    ────────────────────────────────────────────────────── */
    function init() {
      const r  = figEl.getBoundingClientRect();
      const fX = r.left + r.width  * FOOT_X - 17; // cable origin X
      const fY = r.top  + r.height * FOOT_Y;   // cable origin Y
      const eX = window.innerWidth;             // cable end X (screen edge)

      const total = N_INNER + 2;               // including fixed endpoints
      pts = [];
      for (let i = 0; i < total; i++) {
        const t     = i / (total - 1);
        const x     = fX + (eX - fX) * t;
        const restY = fY + Math.sin(Math.PI * t) * SAG; // gentle droop
        pts.push({ x, restY, y: restY, vy: 0 });
      }

      // Place label just to the right of the image, at cable height
      const fs = parseFloat(getComputedStyle(labelEl).fontSize);
      const idealLeft = r.right + 20;
      labelEl.style.left = idealLeft + 'px';
      labelEl.style.top  = (fY - fs - 10) + 'px';
      // Clamp so label never overflows the viewport
      const overflow = idealLeft + labelEl.offsetWidth - window.innerWidth + 8;
      if (overflow > 0) labelEl.style.left = (idealLeft - overflow) + 'px';
    }

    /* ──────────────────────────────────────────────────────
       PATH BUILDER  –  Catmull-Rom → Cubic Bézier
       Converts an array of {x,y} points into a smooth SVG
       path string with no discontinuities at joints.
    ────────────────────────────────────────────────────── */
    function buildPath(pts) {
      const f  = n => n.toFixed(2);
      let   d  = `M${f(pts[0].x)} ${f(pts[0].y)}`;

      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(i - 1, 0)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(i + 2, pts.length - 1)];

        // alpha = 1/6 gives the standard Catmull-Rom tension
        const a   = 1 / 6;
        const c1x = p1.x + (p2.x - p0.x) * a;
        const c1y = p1.y + (p2.y - p0.y) * a;
        const c2x = p2.x - (p3.x - p1.x) * a;
        const c2y = p2.y - (p3.y - p1.y) * a;

        d += ` C${f(c1x)} ${f(c1y)},${f(c2x)} ${f(c2y)},${f(p2.x)} ${f(p2.y)}`;
      }
      return d;
    }

    /* ──────────────────────────────────────────────────────
       PHYSICS LOOP
       Each interior point is a damped spring.
       Endpoints [0] and [last] are fixed anchors.
    ────────────────────────────────────────────────────── */
    function tick() {
      for (let i = 1; i < pts.length - 1; i++) {
        const p = pts[i];

        // ── cursor influence (quadratic falloff, feels smooth) ──
        const dx   = p.x - mX;
        const dy   = p.y - mY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const t    = Math.max(0, 1 - (dist / RADIUS) ** 2);
        const lift = MAX_LIFT * t;

        // ── spring: pull towards (restY - lift) ──────────────
        const target = p.restY - lift;
        const force  = (target - p.y) * SPRING_K;

        // ── integrate with damping ────────────────────────────
        p.vy  = (p.vy + force) * DAMPING;
        p.y  += p.vy;
      }

      pathEl.setAttribute('d', buildPath(pts));
      requestAnimationFrame(tick);
    }

    /* ──────────────────────────────────────────────────────
       EVENTS
    ────────────────────────────────────────────────────── */
    document.addEventListener('mousemove', e => {
      mX = e.clientX;
      mY = e.clientY;
    });

    // Touch: drag activates the lift
    document.addEventListener('touchmove', e => {
      if (e.touches.length) {
        mX = e.touches[0].clientX;
        mY = e.touches[0].clientY;
      }
    }, { passive: true });

    // Touch end: move cursor away so cable falls back
    document.addEventListener('touchend', () => {
      mX = -9999;
      mY = -9999;
    }, { passive: true });

    window.addEventListener('resize', init);

    /* ──────────────────────────────────────────────────────
       BOOT  –  wait for image to have real dimensions
    ────────────────────────────────────────────────────── */
    function boot() {
      init();
      requestAnimationFrame(tick);
    }

    if (figEl.complete && figEl.naturalWidth > 0) {
      boot();
    } else {
      figEl.addEventListener('load', boot);
      window.addEventListener('load', () => { if (!pts.length) boot(); });
    }
  </script>

</body>
</html>
